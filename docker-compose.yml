services:
  postgres:
    image: postgres:16-alpine
    container_name: mediator-postgres
    environment:
      POSTGRES_USER: mediator
      POSTGRES_PASSWORD: mediator
      POSTGRES_DB: mediator
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - mediator-postgres:/var/lib/postgresql/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediator"]
      interval: 5s
      timeout: 5s
      retries: 5

  cups:
    build:
      context: ./cups
    container_name: mediator-cups
    # USB passthrough: only add this when a USB printer is physically attached to this host.
    # Use: docker compose -f docker-compose.yml -f docker-compose.usb.yml up
    # (see docker-compose.usb.yml for the devices: block)
    volumes:
      - cups-socket:/run/cups
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "lpstat -r 2>/dev/null | grep -q 'running'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  mediator:
    build: .
    image: ${MEDIATOR_IMAGE:-mediator:latest}
    env_file: .env
    environment:
      MEDIA_ROOT_DIR: /app/dist/backend/webDav
      DATABASE_URL: postgres://mediator:mediator@postgres:5432/mediator
      # CUPS 2.4 removed CUPS-Get-Devices/CUPS-Get-PPDs over TCP. Use the Unix socket
      # (shared volume) for lpinfo/lpadmin. Set printer.server in Admin UI for a remote server.
      CUPS_SERVER: /run/cups/cups.sock
      # Default queue assignments; overridden at runtime via Admin → Printer Settings
      PRINTER_QUEUE: QL800_box
      PRINTER_QUEUE_BOX: QL800_box
      PRINTER_QUEUE_ITEM: QL800_item
      PRINTER_QUEUE_ITEM_SMALL: QL800_item_small
      PRINTER_QUEUE_SHELF: QL800_shelf
      PRINTER_QUEUE_MARKETING: QL800_marketing
    container_name: mediator
    expose:
      - "8080"
    volumes:
      - mediator-data:/var/lib/mediator
      - mediator-media:/app/dist/backend/media
      - /mnt:/app/dist/backend/webDav
      # Shared CUPS socket from the cups service — not :ro because lpadmin writes to socket
      - cups-socket:/run/cups
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      cups:
        condition: service_healthy

# TODO(ingress-auth): Keep the proxy configuration aligned with docs/setup.md and secrets rotation steps.
  proxy:
    image: nginx:1.25-alpine
    container_name: mediator-proxy
    ports:
      - "8080:8080"
      - "443:443"
    volumes:
      - ./config/nginx/mediator.conf:/etc/nginx/conf.d/default.conf:ro
      - ./secrets/tls/tls.crt:/etc/nginx/tls/tls.crt:ro
      - ./secrets/tls/tls.key:/etc/nginx/tls/tls.key:ro
      - ./secrets/htpasswd:/etc/nginx/secrets/htpasswd:ro
    depends_on:
      mediator:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mediator-data:
    name: mediator-data
  mediator-media:
    name: mediator-media
  mediator-postgres:
    name: mediator-postgres
  nginx-logs:
    name: nginx-logs
  cups-socket:
    name: mediator-cups-socket

secrets:
  mediator_htpasswd:
    file: ./secrets/htpasswd
