LogLevel info
MaxLogSize 0
ErrorLog stderr
AccessLog stderr
PageLog /dev/null

# Listen on both TCP (for lp -h cups:631) and Unix socket (shared named volume)
Listen 0.0.0.0:631
Listen /run/cups/cups.sock

# Allow all operations from Docker bridge subnets without user authentication.
# These addresses are unreachable from outside the Docker network.
<Location />
  Order allow,deny
  Allow from 127.0.0.1
  Allow from 172.16.0.0/12
  Allow from 10.0.0.0/8
  Allow from @LOCAL
</Location>

# Admin operations (lpadmin) allowed from Docker network without credentials.
# AuthType None disables the implicit credential requirement; Allow from restricts by IP.
<Location /admin>
  AuthType None
  Order allow,deny
  Allow from 127.0.0.1
  Allow from 172.16.0.0/12
  Allow from 10.0.0.0/8
  Allow from @LOCAL
</Location>

<Location /printers>
  Order allow,deny
  Allow from 127.0.0.1
  Allow from 172.16.0.0/12
  Allow from @LOCAL
</Location>

# Override the default operation policy so lpadmin works from www-data (mediator).
# CUPS has two auth layers: <Location> (network/IP) and <Policy> (operation/user).
# AuthType None on /admin covers the first layer; this covers the second.
# Network access is still restricted by the <Location> blocks above.
<Policy default>
  <Limit All>
    AuthType None
    Order deny,allow
  </Limit>
</Policy>

# TLS not needed on the Docker-internal network
DefaultEncryption Never
