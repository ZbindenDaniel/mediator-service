# Reference file — NOT parsed at runtime.
# Queues are managed via the admin UI (stored in the mediator DB).
# Use this as a template when setting up queues for the first time.
#
# How to find your device_uri:
#   docker compose exec cups lpinfo -v
#   → usb://Brother/QL-800?serial=YOUR_SERIAL_HERE
#
# How to find the PPD model string:
#   docker compose exec cups lpinfo -m | grep -i ql800
#   → brother_ql800  Brother QL-800 series
#
# Then go to Admin → Printer Queues → Add queue and fill in the values below.

[QL800_box]
name=QL800_box
device_uri=usb://Brother/QL-800?serial=REPLACE_WITH_SERIAL
ppd=Brother QL-800 series
media=w62h100
label_type=box

[QL800_item]
name=QL800_item
device_uri=usb://Brother/QL-800?serial=REPLACE_WITH_SERIAL
ppd=Brother QL-800 series
media=w29h90
label_type=item

[QL800_item_small]
name=QL800_item_small
device_uri=usb://Brother/QL-800?serial=REPLACE_WITH_SERIAL
ppd=Brother QL-800 series
media=w62h10
label_type=smallitem

[QL800_shelf]
name=QL800_shelf
device_uri=usb://Brother/QL-800?serial=REPLACE_WITH_SERIAL
