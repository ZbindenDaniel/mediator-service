<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <title>Produktblatt A4</title>
  <style>
    @page {
      size: A4 landscape;
      margin: 12mm;
    }

    :root {
      color-scheme: only light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #f3f4f6;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    .sheet {
      width: 273mm;
      min-height: 186mm;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1.5px solid #d1d5db;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      background: #1f2937;
      color: #fff;
      padding: 5mm 8mm 4mm;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 4mm;
    }

    .header-title {
      flex: 1;
    }

    .item-name {
      font-size: 18pt;
      font-weight: 700;
      line-height: 1.2;
      margin: 0;
    }

    .item-category {
      font-size: 9pt;
      font-weight: 400;
      color: #9ca3af;
      margin-top: 1mm;
    }

    .item-manufacturer {
      font-size: 9pt;
      font-weight: 600;
      color: #d1d5db;
      margin-top: 0.5mm;
    }

    /* ── Body: 3-column grid ─────────────────────────────────── */
    .body {
      display: grid;
      grid-template-columns: 60mm 1fr 1fr;
      flex: 1;
    }

    /* ── Left column: QR + meta + price ─────────────────────── */
    .left-col {
      display: flex;
      flex-direction: column;
      padding: 5mm 5mm 5mm 5mm;
      gap: 3mm;
      border-right: 1.5px solid #e5e7eb;
    }

    .qr-row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2mm;
    }

    .qr-img,
    .qr-canvas {
      width: 28mm;
      height: 28mm;
      image-rendering: pixelated;
    }

    .qr-label {
      font-size: 7pt;
      color: #6b7280;
      line-height: 1.4;
    }

    .material-number {
      font-size: 7pt;
      color: #6b7280;
      font-family: 'Courier New', monospace;
    }

    /* ── Quality badge ───────────────────────────────────────── */
    .quality-badge {
      display: flex;
      align-items: center;
      gap: 2mm;
      border-radius: 2mm;
      padding: 2mm 3mm;
      font-size: 8pt;
      font-weight: 600;
    }

    .quality-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── CO₂ badge ───────────────────────────────────────────── */
    .co2-badge {
      display: flex;
      align-items: center;
      gap: 2mm;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 2mm;
      padding: 2mm 3mm;
      font-size: 7.5pt;
      color: #166534;
    }

    .co2-value {
      font-weight: 700;
    }

    /* ── Price block ─────────────────────────────────────────── */
    .price-block {
      margin-top: auto;
      padding: 3mm 4mm;
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      border-radius: 2mm;
    }

    .price-label {
      font-size: 7.5pt;
      color: #15803d;
    }

    .price-line {
      display: flex;
      align-items: baseline;
      gap: 1mm;
    }

    .price-currency {
      font-size: 10pt;
      font-weight: 600;
      color: #166534;
    }

    .price-amount {
      font-size: 18pt;
      font-weight: 700;
      color: #166534;
    }

    .no-price {
      margin-top: auto;
      font-size: 8pt;
      color: #9ca3af;
      font-style: italic;
    }

    /* ── Middle + Right columns ──────────────────────────────── */
    .mid-col {
      display: flex;
      flex-direction: column;
      padding: 5mm;
      gap: 3mm;
      border-right: 1.5px solid #e5e7eb;
    }

    .right-col {
      display: flex;
      flex-direction: column;
      padding: 5mm;
      gap: 3mm;
    }

    .section-title {
      font-size: 7.5pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 1.5mm;
    }

    .description {
      font-size: 9pt;
      color: #374151;
      line-height: 1.5;
    }

    .specs-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 8pt;
    }

    .specs-table tr:nth-child(odd) td {
      background: #f9fafb;
    }

    .specs-table td {
      padding: 1mm 2mm;
      vertical-align: top;
      color: #374151;
    }

    .specs-table td:first-child {
      font-weight: 600;
      color: #1f2937;
      width: 42%;
      white-space: nowrap;
    }

    .error {
      margin: 16px;
      padding: 12px 14px;
      border-radius: 6px;
      background: #fee2e2;
      color: #b91c1c;
      font-size: 11pt;
    }

    @media print {
      body {
        background: none;
      }

      .sheet {
        border-color: #d1d5db;
        page-break-inside: avoid;
        box-shadow: none;
      }

      .error {
        display: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="sheet" id="sheet" hidden>
    <div class="header">
      <div class="header-title">
        <div class="item-name" id="itemName">Artikelname</div>
        <div class="item-category" id="itemCategory"></div>
        <div class="item-manufacturer" id="itemManufacturer"></div>
      </div>
    </div>

    <div class="body">
      <!-- Left column: QR + CO₂ + quality + price -->
      <div class="left-col">
        <div class="qr-row">
          <img class="qr-img" id="qrImage" alt="QR-Code" hidden />
          <canvas class="qr-canvas" id="qrCanvas" hidden></canvas>
          <div class="qr-label">Artikel scannen für<br>mehr Informationen</div>
          <div class="material-number" id="materialNumber"></div>
        </div>

        <div id="qualitySection" hidden>
          <div class="section-title">Zustand</div>
          <div class="quality-badge" id="qualityBadge">
            <span class="quality-dot" id="qualityDot"></span>
            <span id="qualityLabel"></span>
          </div>
        </div>

        <div id="co2Section" hidden>
          <div class="co2-badge">
            <span>🌱</span>
            <span id="co2Label"></span>
          </div>
        </div>

        <div id="priceSection">
          <div class="price-block" id="priceBlock" hidden>
            <div class="price-label">Verkaufspreis</div>
            <div class="price-line">
              <span class="price-currency" id="priceCurrency">CHF</span>
              <span class="price-amount" id="priceAmount"></span>
            </div>
          </div>
          <div class="no-price" id="noPrice" hidden>Preis auf Anfrage</div>
        </div>
      </div>

      <!-- Middle column: description + reference specs -->
      <div class="mid-col">
        <div id="descriptionSection" hidden>
          <div class="section-title">Beschreibung</div>
          <div class="description" id="description"></div>
        </div>

        <div id="specsSection" hidden>
          <div class="section-title">Spezifikationen</div>
          <table class="specs-table" id="specsTable"></table>
        </div>
      </div>

      <!-- Right column: instance specs from quality review -->
      <div class="right-col">
        <div id="instanceSpecsSection" hidden>
          <div class="section-title">Gerätedetails</div>
          <table class="specs-table" id="instanceSpecsTable"></table>
        </div>
      </div>
    </div>
  </div>

  <div class="error" id="error" hidden></div>

  <script>
    (function init() {
      var QUALITY_LABELS = {1: 'Ersatzteil', 2: 'Upcycling', 3: 'Ok', 4: 'Gut', 5: 'Neuwertig'};
      var QUALITY_COLORS = {1: '#9333ea', 2: '#ef4444', 3: '#eab308', 4: '#f97316', 5: '#22c55e'};
      var QUALITY_BG    = {1: '#faf5ff', 2: '#fef2f2', 3: '#fefce8', 4: '#fff7ed', 5: '#f0fdf4'};

      var sheetEl              = document.getElementById('sheet');
      var itemNameEl           = document.getElementById('itemName');
      var itemCategoryEl       = document.getElementById('itemCategory');
      var itemManufacturerEl   = document.getElementById('itemManufacturer');
      var qrImageEl            = document.getElementById('qrImage');
      var qrCanvasEl           = document.getElementById('qrCanvas');
      var materialNumberEl     = document.getElementById('materialNumber');
      var qualitySectionEl     = document.getElementById('qualitySection');
      var qualityBadgeEl       = document.getElementById('qualityBadge');
      var qualityDotEl         = document.getElementById('qualityDot');
      var qualityLabelEl       = document.getElementById('qualityLabel');
      var co2SectionEl         = document.getElementById('co2Section');
      var co2LabelEl           = document.getElementById('co2Label');
      var priceBlockEl         = document.getElementById('priceBlock');
      var priceAmountEl        = document.getElementById('priceAmount');
      var priceCurrencyEl      = document.getElementById('priceCurrency');
      var noPriceEl            = document.getElementById('noPrice');
      var descriptionSectionEl = document.getElementById('descriptionSection');
      var descriptionEl        = document.getElementById('description');
      var specsSectionEl       = document.getElementById('specsSection');
      var specsTableEl         = document.getElementById('specsTable');
      var instanceSpecsSectionEl = document.getElementById('instanceSpecsSection');
      var instanceSpecsTableEl   = document.getElementById('instanceSpecsTable');
      var errorEl              = document.getElementById('error');

      function drawMatrix(modules) {
        if (!qrCanvasEl || !Array.isArray(modules) || modules.length === 0) return false;
        try {
          var size = modules.length;
          var pixelSize = 400;
          var scale = Math.floor(pixelSize / size);
          var offset = Math.floor((pixelSize - size * scale) / 2);
          var ctx = qrCanvasEl.getContext('2d');
          if (!ctx) return false;
          qrCanvasEl.width = pixelSize;
          qrCanvasEl.height = pixelSize;
          ctx.clearRect(0, 0, pixelSize, pixelSize);
          ctx.fillStyle = '#1f2937';
          modules.forEach(function(row, y) {
            row.forEach(function(cell, x) {
              if (cell) ctx.fillRect(offset + x * scale, offset + y * scale, scale, scale);
            });
          });
          qrCanvasEl.hidden = false;
          return true;
        } catch (err) {
          console.error('Failed to draw QR matrix', err);
          return false;
        }
      }

      function showError(message) {
        if (!errorEl) return;
        errorEl.textContent = message;
        errorEl.hidden = false;
        if (sheetEl) sheetEl.hidden = true;
      }

      function escHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function buildTableRows(specs) {
        if (!specs || typeof specs !== 'object' || Array.isArray(specs)) return '';
        var entries = Object.entries(specs).filter(function(e) {
          return e[1] !== null && e[1] !== undefined && e[1] !== '';
        });
        if (entries.length === 0) return '';
        return entries.map(function(entry) {
          var val = Array.isArray(entry[1]) ? entry[1].join(', ') : String(entry[1]);
          return '<tr><td>' + escHtml(entry[0]) + '</td><td>' + escHtml(val) + '</td></tr>';
        }).join('');
      }

      function render(payload) {
        if (!payload || typeof payload !== 'object') {
          showError('Kein gültiger Payload vorhanden.');
          return;
        }
        try {
          if (itemNameEl) itemNameEl.textContent = payload.labelText || payload.id || '';
          if (itemCategoryEl && payload.category) itemCategoryEl.textContent = payload.category;
          if (itemManufacturerEl && payload.manufacturer) itemManufacturerEl.textContent = payload.manufacturer;
          if (materialNumberEl && payload.materialNumber) materialNumberEl.textContent = payload.materialNumber;

          // QR code
          var hasDataUri = typeof payload.qrDataUri === 'string' && payload.qrDataUri.startsWith('data:image/');
          if (qrImageEl) {
            if (hasDataUri) {
              qrImageEl.src = payload.qrDataUri;
              qrImageEl.hidden = false;
            } else {
              qrImageEl.hidden = true;
            }
          }
          if (!hasDataUri && Array.isArray(payload.qrModules)) {
            drawMatrix(payload.qrModules);
          }

          // Quality
          var q = typeof payload.quality === 'number' ? Math.round(payload.quality) : null;
          if (q && q >= 1 && q <= 5 && qualitySectionEl && qualityBadgeEl && qualityDotEl && qualityLabelEl) {
            qualityDotEl.style.backgroundColor = QUALITY_COLORS[q] || '#9ca3af';
            qualityBadgeEl.style.backgroundColor = QUALITY_BG[q] || '#f9fafb';
            qualityBadgeEl.style.border = '1px solid ' + (QUALITY_COLORS[q] || '#9ca3af') + '44';
            qualityLabelEl.style.color = QUALITY_COLORS[q] || '#374151';
            qualityLabelEl.textContent = QUALITY_LABELS[q] || String(q);
            qualitySectionEl.hidden = false;
          }

          // CO₂
          var CO2_LABELS_DE = { high: 'Hohes Potenzial', medium: 'Mittleres Potenzial', low: 'Geringes Potenzial' };
          if (payload.co2ImpactLabel && CO2_LABELS_DE[payload.co2ImpactLabel] && co2SectionEl && co2LabelEl) {
            co2LabelEl.textContent = CO2_LABELS_DE[payload.co2ImpactLabel];
            co2SectionEl.hidden = false;
          }

          // Price
          if (typeof payload.price === 'number') {
            if (priceAmountEl) priceAmountEl.textContent = payload.price.toFixed(2);
            if (priceCurrencyEl) priceCurrencyEl.textContent = payload.currency || 'CHF';
            if (priceBlockEl) priceBlockEl.hidden = false;
          } else {
            if (noPriceEl) noPriceEl.hidden = false;
          }

          // Description
          if (payload.description && descriptionSectionEl && descriptionEl) {
            descriptionEl.textContent = payload.description;
            descriptionSectionEl.hidden = false;
          }

          // Reference specs (Langtext)
          if (payload.specs && specsTableEl && specsSectionEl) {
            var rows = buildTableRows(payload.specs);
            if (rows) {
              specsTableEl.innerHTML = rows;
              specsSectionEl.hidden = false;
            }
          }

          // Instance specs (from quality review)
          if (payload.instanceSpecs && instanceSpecsTableEl && instanceSpecsSectionEl) {
            var iRows = buildTableRows(payload.instanceSpecs);
            if (iRows) {
              instanceSpecsTableEl.innerHTML = iRows;
              instanceSpecsSectionEl.hidden = false;
            }
          }

          if (sheetEl) sheetEl.hidden = false;
        } catch (err) {
          console.error('Render error in item-a4 marketing sheet', err);
          showError('Vorlage konnte nicht gerendert werden.');
        }
      }

      function tryInlinePayload() {
        var inlinePayload = window.__LABEL_PAYLOAD__;
        if (!inlinePayload) return false;
        try {
          render(inlinePayload);
          return true;
        } catch (err) {
          console.error('Failed to render inline payload', err);
          showError('Eingebettete Druckdaten konnten nicht gelesen werden.');
          return true;
        }
      }

      function tryFromStorage(key) {
        if (!key) return false;
        try {
          var raw = sessionStorage.getItem(key);
          if (!raw) {
            showError('Kein zwischengespeicherter Payload gefunden.');
            return true;
          }
          var payload = JSON.parse(raw);
          sessionStorage.removeItem(key);
          render(payload);
          return true;
        } catch (err) {
          console.error('Failed to load payload from storage', err);
          showError('Payload konnte nicht gelesen werden.');
          return true;
        }
      }

      function handleMessage(event) {
        if (event.origin && event.origin !== window.location.origin) {
          console.warn('Ignoring message from unexpected origin', event.origin);
          return;
        }
        try {
          var data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
          if (data && data.payload) render(data.payload);
        } catch (err) {
          console.error('Failed to parse postMessage payload', err);
          showError('Übertragene Daten ungültig.');
        }
      }

      window.addEventListener('message', handleMessage, { once: true });

      var params = new URLSearchParams(window.location.search);
      var key = params.get('key');
      if (!tryInlinePayload() && !tryFromStorage(key)) {
        console.warn('Warte auf Payload via postMessage…');
      }
    })();
  </script>
</body>

</html>
