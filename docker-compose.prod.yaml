services:
  postgres:
    image: postgres:16-alpine
    container_name: mediator-postgres
    environment:
      POSTGRES_USER: mediator
      POSTGRES_PASSWORD: mediator
      POSTGRES_DB: mediator
    volumes:
      - mediator-postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediator"]
      interval: 5s
      timeout: 5s
      retries: 5

  mediator:
    image: ghcr.io/zbindendaniel/mediator-service:3.0
    env_file: .env
    environment:
      MEDIA_ROOT_DIR: /app/dist/backend/webDav
      DATABASE_URL: postgres://mediator:mediator@postgres:5432/mediator
    container_name: mediator
    expose:
      - "8080"
    volumes:
      - mediator-data:/var/lib/mediator
      - mediator-media:/app/dist/backend/media
      - /mnt:/app/dist/backend/webDav
      - /run/cups:/run/cups:ro
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.erfassung.rule=Host(`erfassung.${VM_IP}.nip.io`)"
      - "traefik.http.routers.erfassung.tls=true"
      - "traefik.http.services.erfassung.loadbalancer.server.port=8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erfassung_default   # keep internal communication
      - traefik_proxy      # reverse proxy to allow https connections

volumes:
  mediator-data:
    name: mediator-data
  mediator-media:
    name: mediator-media
  mediator-postgres:
    name: mediator-postgres
  nginx-logs:
    name: nginx-logs

secrets:
  mediator_htpasswd:
    file: ./secrets/htpasswd

networks:
  erfassung_default:
  traefik_proxy:
     external: true

