services:
  postgres:
    image: postgres:16-alpine
    container_name: mediator-postgres
    environment:
      POSTGRES_USER: mediator
      POSTGRES_PASSWORD: mediator
      POSTGRES_DB: mediator
    ports:
      - "5432:5432"
    volumes:
      - mediator-postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediator"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - erfassung_default

  cups:
    build:
      context: ./cups
    container_name: mediator-cups
    # USB passthrough: only add this when a USB printer is physically attached to this host.
    # Use: docker compose -f docker-compose.prod.yaml -f docker-compose.usb.yml up
    volumes:
      - cups-socket:/run/cups
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "lpstat -H 2>/dev/null | grep -q ':'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    # Internal network only — no traefik exposure for CUPS
    networks:
      - erfassung_default

  mediator:
    image: ghcr.io/zbindendaniel/mediator-service:3.0
    env_file: .env
    environment:
      MEDIA_ROOT_DIR: /app/dist/backend/webDav
      DATABASE_URL: postgres://mediator:mediator@postgres:5432/mediator
      CUPS_HOST: cups:631
      PRINTER_QUEUE: QL800_box
      PRINTER_QUEUE_BOX: QL800_box
      PRINTER_QUEUE_ITEM: QL800_item
      PRINTER_QUEUE_ITEM_SMALL: QL800_item_small
      PRINTER_QUEUE_SHELF: QL800_shelf
      PRINTER_QUEUE_MARKETING: QL800_marketing
    container_name: mediator
    expose:
      - "8080"
    volumes:
      - mediator-data:/var/lib/mediator
      - mediator-media:/app/dist/backend/media
      - /mnt:/app/dist/backend/webDav
      - cups-socket:/run/cups:ro
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.erfassung.rule=Host(`erfassung.${VM_IP}.nip.io`)"
      - "traefik.http.routers.erfassung.tls=true"
      - "traefik.http.services.erfassung.loadbalancer.server.port=8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      cups:
        condition: service_healthy
    networks:
      - erfassung_default
      - traefik_proxy

volumes:
  mediator-data:
    name: mediator-data
  mediator-media:
    name: mediator-media
  mediator-postgres:
    name: mediator-postgres
  nginx-logs:
    name: nginx-logs
  cups-socket:
    name: mediator-cups-socket

secrets:
  mediator_htpasswd:
    file: ./secrets/htpasswd

networks:
  erfassung_default:
  traefik_proxy:
     external: true
