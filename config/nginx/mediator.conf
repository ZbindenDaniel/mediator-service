# TODO(ingress-auth): Review TLS and auth paths before first production rollout.
log_format auth_log '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Strict zone for brute-force protection on the basic-auth login prompt.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
# Permissive zone for authenticated API traffic from the SPA (many concurrent requests per user action).
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_status 429;

server {
  listen 80;
  server_name _;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name _;

  ssl_certificate /etc/nginx/tls/tls.crt;
  ssl_certificate_key /etc/nginx/tls/tls.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  access_log /var/log/nginx/access.log auth_log;
  error_log /var/log/nginx/error.log warn;

  auth_basic "Mediator";
  auth_basic_user_file /etc/nginx/secrets/htpasswd;

  # resolver + variable defers DNS lookup to request time (avoids "host not found" at startup)
  resolver 127.0.0.11 valid=30s;
  set $upstream http://mediator:8080;

  # Admin API uses Bearer token auth (ADMIN_SECRET) — bypass nginx Basic Auth so the
  # Bearer header reaches the backend without being rejected as invalid Basic Auth.
  location /api/admin/ {
    auth_basic off;
    # API traffic: permissive limit (SPA fires many concurrent requests per user action)
    limit_req zone=api_limit burst=300 nodelay;
    proxy_pass $upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
  }

  location /api/ {
    # API traffic: permissive limit (SPA fires many concurrent requests per user action)
    limit_req zone=api_limit burst=300 nodelay;
    proxy_pass $upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
  }

  location / {
    # Strict limit on browser-facing routes to protect the basic-auth login prompt.
    limit_req zone=auth_limit burst=20 nodelay;
    proxy_pass $upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
  }
}
